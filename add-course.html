<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course.NET</title>
  <meta name="description" content="Course.NET">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Add Course</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">My Courses</a></li>
      <li><a href="add-course.html">Add Course</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>
<main>
  <section class="add-course-section">
    <h2 class="add-course-title">Add a New Course</h2>
    <form class="add-course-form" method="post">
      <label for="course-name">Course Name:</label>
      <input type="text" id="course-name" name="course-name" placeholder="Enter course name" required>

      <label for="instructor">Instructor:</label>
      <input type="text" id="instructor" name="instructor" placeholder="Enter instructor name" required>

      <label for="credit-hours">Credit Hours:</label>
      <input type="number" id="credit-hours" name="credit-hours" placeholder="Enter credit hours" required>

      <label for="notes">Notes:</label>
      <textarea id="notes" name="notes" placeholder="Enter notes or details"></textarea>

      <button type="submit">Add Course</button>
    </form>
  </section>
</main>


<footer>

  </pre>
</footer>
</body>
</html>
