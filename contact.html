<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Contact Us</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="courses.html">My Courses</a></li>
      <li><a href="add-course.html">Add Course</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>
<main>
  <section class="contact-section">
    <h2 class="contact-title">Contact Us</h2>
    <p class="contact-info">If you have a problem, please fill out the form and send us your issue.</p>
    
    <form class="contact-form" method="post">
      <label for="fullname">Full Name:</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

      <label for="id">ID:</label>
      <input type="text" id="id" name="id" placeholder="Enter your ID" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4" placeholder="Enter your problem here"></textarea>

      <button type="submit">Send</button>
    </form>
  </section>
</main>


<footer>

    created by eng~Yassin Hussein.
  </pre>
</footer>
</body>
</html>
